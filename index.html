<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>報單格式轉換器</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 20px;
  }
  h1 {
    font-size: 24px;
    margin-bottom: 24px;
    color: #00d4aa;
  }
  .container {
    display: flex;
    gap: 20px;
    width: 100%;
    max-width: 900px;
    flex-wrap: wrap;
  }
  .panel {
    flex: 1;
    min-width: 300px;
    background: #16213e;
    border-radius: 12px;
    padding: 20px;
    border: 1px solid #2a2a4a;
  }
  .panel h2 {
    font-size: 16px;
    margin-bottom: 12px;
    color: #8892b0;
  }
  textarea {
    width: 100%;
    height: 200px;
    background: #0f0f23;
    color: #e0e0e0;
    border: 1px solid #2a2a4a;
    border-radius: 8px;
    padding: 12px;
    font-size: 14px;
    font-family: 'Consolas', 'Microsoft JhengHei', monospace;
    resize: vertical;
    line-height: 1.6;
  }
  textarea:focus { outline: none; border-color: #00d4aa; }
  .tp-section {
    margin-top: 16px;
  }
  .tp-section label {
    display: block;
    font-size: 14px;
    color: #8892b0;
    margin-bottom: 8px;
  }
  .tp-input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
    align-items: center;
  }
  .tp-input-row span {
    color: #8892b0;
    font-size: 13px;
    min-width: 20px;
  }
  .tp-input-row input {
    flex: 1;
    background: #0f0f23;
    color: #e0e0e0;
    border: 1px solid #2a2a4a;
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 14px;
    font-family: 'Consolas', monospace;
  }
  .tp-input-row input:focus { outline: none; border-color: #00d4aa; }
  .tp-input-row button {
    background: #e74c3c;
    color: white;
    border: none;
    border-radius: 6px;
    width: 28px;
    height: 28px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .tp-input-row button:hover { background: #c0392b; }
  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .btn {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    font-family: 'Microsoft JhengHei', sans-serif;
    font-weight: bold;
    transition: all 0.2s;
  }
  .btn-convert {
    background: #00d4aa;
    color: #0f0f23;
    flex: 1;
  }
  .btn-convert:hover { background: #00b894; }
  .btn-add-tp {
    background: #2a2a4a;
    color: #e0e0e0;
  }
  .btn-add-tp:hover { background: #3a3a5a; }
  .btn-copy {
    background: #6c5ce7;
    color: white;
    width: 100%;
    margin-top: 12px;
  }
  .btn-copy:hover { background: #5a4bd1; }
  .btn-copy.copied { background: #00b894; }
  .hint {
    font-size: 12px;
    color: #555;
    margin-top: 8px;
    line-height: 1.5;
  }
  .output-wrap { position: relative; }
</style>
</head>
<body>

<h1>報單格式轉換器</h1>

<div class="container">
  <div class="panel">
    <h2>貼上原始報單 (OKX 格式)</h2>
    <textarea id="input" placeholder="開空 HYPEUSDT 永續 27x
委託類型：限價委託
價格：39.1
止盈：限價 38
止損：當最新價格達到 40.1 時下市價單"></textarea>

    <div class="tp-section">
      <label>額外止盈目標（選填，第一個會從原文自動抓）</label>
      <div id="tp-list"></div>
      <button class="btn btn-add-tp" id="addTpBtn">+ 新增止盈目標</button>
    </div>

    <div class="btn-row">
      <button class="btn btn-convert" id="convertBtn">轉換 →</button>
    </div>
    <div class="hint">支援「開多/開空」「限價/市價」，自動解析幣種、方向、槓桿、價格、止損、止盈</div>
  </div>

  <div class="panel">
    <h2>輸出結果</h2>
    <div class="output-wrap">
      <textarea id="output" readonly placeholder="轉換後的報單會顯示在這裡..."></textarea>
      <button class="btn btn-copy" id="copyBtn">複製結果</button>
    </div>
  </div>
</div>

<script>
let tpCount = 0;

function addTp(value) {
  tpCount++;
  const row = document.createElement('div');
  row.className = 'tp-input-row';
  row.innerHTML = `
    <input type="text" class="tp-extra" placeholder="例: 37.5" value="${value || ''}">
    <button class="tp-remove">×</button>
  `;
  row.querySelector('.tp-remove').addEventListener('click', function() { row.remove(); });
  document.getElementById('tp-list').appendChild(row);
}

function convert() {
  const raw = document.getElementById('input').value.trim();
  if (!raw) return;

  // Parse direction + coin + leverage
  let coin = '', direction = '', leverage = '';
  const line1Match = raw.match(/開(多|空)\s+(\w+?)(USDT|USD)\s+永續\s+(\d+)[xX]/i);
  if (line1Match) {
    direction = line1Match[1] === '多' ? '多' : '空';
    coin = line1Match[2] + '/' + line1Match[3];
    leverage = line1Match[4] + 'X';
  }

  // Parse price
  let price = '';
  const priceMatch = raw.match(/價格[：:]\s*([\d.]+)/);
  if (priceMatch) price = priceMatch[1];

  // Parse stop loss
  let stopLoss = '';
  const slMatch = raw.match(/止損[：:].*?([\d.]+)/);
  if (slMatch) stopLoss = slMatch[1];

  // Parse take profit from original
  let tpFromOriginal = '';
  const tpMatch = raw.match(/止盈[：:].*?([\d.]+)/);
  if (tpMatch) tpFromOriginal = tpMatch[1];

  // Collect all TPs
  const tps = [];
  if (tpFromOriginal) tps.push(tpFromOriginal);
  document.querySelectorAll('.tp-extra').forEach(input => {
    const v = input.value.trim();
    if (v) tps.push(v);
  });

  // Build output
  let out = '';
  out += `幣種：${coin}\n`;
  out += `方向：${direction}\n`;
  out += `槓桿:${leverage}\n`;
  out += `開倉價格：${price}\n`;
  out += `止損價格：${stopLoss}\n`;
  out += `\n止盈價格：\n`;
  tps.forEach((tp, i) => {
    out += `${i + 1}) ${tp}\n`;
  });

  out += `\n請嚴格控制倉位比例,並確認自身風險承受,策略具 時效性僅供參考,不構成任何投資建議`;

  document.getElementById('output').value = out.trim();
}

function copyOutput() {
  const output = document.getElementById('output');
  navigator.clipboard.writeText(output.value).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '已複製 ✓';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '複製結果';
      btn.classList.remove('copied');
    }, 2000);
  });
}

// Bind events
document.getElementById('convertBtn').addEventListener('click', function() { convert(); });
document.getElementById('addTpBtn').addEventListener('click', function() { addTp(); });
document.getElementById('copyBtn').addEventListener('click', function() { copyOutput(); });

// Auto-convert on paste or input
document.getElementById('input').addEventListener('input', function() { convert(); });
document.getElementById('input').addEventListener('paste', function() {
  setTimeout(function() { convert(); }, 50);
});
</script>

</body>
</html>
